name: Snapshot

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Read POM version
        id: snapshot
        run: |
          VERSION=$(python - <<'PY'
import xml.etree.ElementTree as ET
from pathlib import Path
root = ET.parse(Path('pom.xml')).getroot()
ns = {'m': 'http://maven.apache.org/POM/4.0.0'}
version = root.find('m:version', ns)
print(version.text if version is not None else '1.0.0')
PY
)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "SNAPSHOT_VERSION=snapshot-${VERSION}" >> $GITHUB_OUTPUT
          echo "TAG=snapshot-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build with Maven
        run: mvn clean package

      - name: Get snapshot artifacts
        id: assets
        run: |
          ASSET_PATH=$(ls $GITHUB_WORKSPACE/target/sap-devops-*.zip 2>/dev/null | head -1)
          if [ -z "$ASSET_PATH" ]; then
            echo "Error: No zip artifact found in $GITHUB_WORKSPACE/target/"
            ls -la $GITHUB_WORKSPACE/target/ || true
            exit 1
          fi
          SNAPSHOT_NAME="sap-devops-${{ steps.snapshot.outputs.SNAPSHOT_VERSION }}.zip"
          mv "$ASSET_PATH" "$GITHUB_WORKSPACE/$SNAPSHOT_NAME"
          echo "ASSET_PATH=$GITHUB_WORKSPACE/$SNAPSHOT_NAME" >> $GITHUB_OUTPUT
          echo "Found and renamed artifact to: $SNAPSHOT_NAME"

      - name: Create snapshot release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.snapshot.outputs.TAG }}
          name: Snapshot ${{ steps.snapshot.outputs.VERSION }}
          draft: false
          prerelease: true
          artifacts: ${{ steps.assets.outputs.ASSET_PATH }}
          allowUpdates: true
          updateOnlyUnreleased: false

      - name: Remove GitHub source archives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.snapshot.outputs.TAG }}"
          gh release view "$TAG" --json assets -q '.assets[].name' 2>/dev/null | \
            grep -E 'Source code' | while read -r name; do
              echo "Removing: $name"
              gh release delete-asset "$TAG" "$name" --repo "${{ github.repository }}" --yes || true
            done

      - name: Clean old snapshots
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          
          gh release list --repo "$REPO" \
            --limit 100 \
            --exclude-drafts \
            | grep "snapshot-" \
            | tail -n +6 \
            | awk '{print $1}' \
            | while read tag; do
              echo "Deleting old snapshot: $tag"
              gh release delete "$tag" --repo "$REPO" --yes
            done

