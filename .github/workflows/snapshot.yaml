name: Snapshot

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Generate snapshot version
        id: snapshot
        run: |
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "TAG=snapshot-$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Build with Maven
        run: mvn clean package

      - name: Get snapshot artifacts
        id: assets
        run: |
          ASSET_PATH=$(ls target/sap-devops-*.zip 2>/dev/null | head -1)
          if [ -z "$ASSET_PATH" ]; then
            echo "Error: No zip artifact found"
            exit 1
          fi
          SNAPSHOT_NAME="sap-devops-snapshot-${{ steps.snapshot.outputs.TIMESTAMP }}.zip"
          mv "$ASSET_PATH" "$SNAPSHOT_NAME"
          echo "ASSET_PATH=$SNAPSHOT_NAME" >> $GITHUB_OUTPUT

      - name: Create snapshot release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.snapshot.outputs.TAG }}
          name: Snapshot ${{ steps.snapshot.outputs.TIMESTAMP }}
          draft: false
          prerelease: true
          artifacts: ${{ steps.assets.outputs.ASSET_PATH }}
          allowUpdates: true
          updateOnlyUnrelease: false

      - name: Clean old snapshots
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          
          gh release list --repo "$REPO" \
            --limit 100 \
            --exclude-drafts \
            | grep "snapshot-" \
            | tail -n +6 \
            | awk '{print $1}' \
            | while read tag; do
              echo "Deleting old snapshot: $tag"
              gh release delete "$tag" --repo "$REPO" --yes
            done
