name: Snapshot

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Read POM version
        id: snapshot
        run: |
          VERSION=$(python -c "import xml.etree.ElementTree as ET; tree=ET.parse('pom.xml'); root=tree.getroot(); ns={'m':'http://maven.apache.org/POM/4.0.0'}; v=root.find('m:version', ns); print(v.text if v is not None else '1.0.0')")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "SNAPSHOT_VERSION=snapshot-${VERSION}" >> $GITHUB_OUTPUT
          echo "TAG=snapshot-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build with Maven
        run: mvn clean package

      - name: Get snapshot artifacts
        id: assets
        run: |
          ASSET_PATH=$(ls $GITHUB_WORKSPACE/target/sap-devops-*.zip 2>/dev/null | head -1)
          if [ -z "$ASSET_PATH" ]; then
            echo "Error: No zip artifact found in $GITHUB_WORKSPACE/target/"
            ls -la $GITHUB_WORKSPACE/target/ || true
            exit 1
          fi
          SNAPSHOT_NAME="sap-devops-${{ steps.snapshot.outputs.SNAPSHOT_VERSION }}.zip"
          mv "$ASSET_PATH" "$GITHUB_WORKSPACE/$SNAPSHOT_NAME"
          echo "ASSET_PATH=$GITHUB_WORKSPACE/$SNAPSHOT_NAME" >> $GITHUB_OUTPUT
          echo "Found and renamed artifact to: $SNAPSHOT_NAME"

      - name: Create snapshot release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.snapshot.outputs.TAG }}
          name: Snapshot ${{ steps.snapshot.outputs.VERSION }}
          draft: false
          prerelease: true
          artifacts: ${{ steps.assets.outputs.ASSET_PATH }}
          allowUpdates: true
          updateOnlyUnreleased: false

      - name: Remove GitHub source archives
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Authenticate gh with the provided token
          echo "$GITHUB_TOKEN" | gh auth login --with-token || true

          REPO="${{ github.repository }}"
          TAG="${{ steps.snapshot.outputs.TAG }}"

          # Retry deletion a few times to handle eventual consistency
          for i in 1 2 3 4 5; do
            echo "Attempt $i: checking for source archives in release $TAG"
            ASSET_IDS=$(gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[] | select(.name | test("Source code")) | .id' 2>/dev/null || true)
            if [ -z "$ASSET_IDS" ]; then
              echo "No source archives found to remove"
              break
            fi
            for id in $ASSET_IDS; do
              echo "Deleting asset id: $id"
              gh api -X DELETE /repos/$REPO/releases/assets/$id -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" || true
            done
            echo "Waiting for assets to disappear..."
            sleep 3
          done

      - name: Clean old snapshots
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          
          gh release list --repo "$REPO" \
            --limit 100 \
            --exclude-drafts \
            | grep "snapshot-" \
            | tail -n +6 \
            | awk '{print $1}' \
            | while read tag; do
              echo "Deleting old snapshot: $tag"
              gh release delete "$tag" --repo "$REPO" --yes
            done

