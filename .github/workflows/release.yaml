name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Extract version from input
        id: version
        run: echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT

      - name: Build with Maven
        run: mvn clean package

      - name: Get release assets
        id: assets
        run: |
          ASSET_PATH=$(ls $GITHUB_WORKSPACE/target/sap-devops-*.zip 2>/dev/null | head -1)
          if [ -z "$ASSET_PATH" ]; then
            echo "Error: No zip artifact found in $GITHUB_WORKSPACE/target/"
            ls -la $GITHUB_WORKSPACE/target/ || true
            exit 1
          fi
          echo "ASSET_PATH=$ASSET_PATH" >> $GITHUB_OUTPUT
          echo "ASSET_NAME=$(basename $ASSET_PATH)" >> $GITHUB_OUTPUT
          echo "Found artifact: $ASSET_PATH"

      - name: Create Release
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          artifacts: ${{ steps.assets.outputs.ASSET_PATH }}

