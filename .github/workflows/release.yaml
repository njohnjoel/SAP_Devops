name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Extract version from input
        id: version
        run: echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT

      - name: Build with Maven
        run: mvn clean package

      - name: Get release assets
        id: assets
        run: |
          ASSET_PATH=$(ls target/sap-devops-*.zip 2>/dev/null | head -1)
          if [ -z "$ASSET_PATH" ]; then
            echo "Error: No zip artifact found"
            exit 1
          fi
          echo "ASSET_PATH=$ASSET_PATH" >> $GITHUB_OUTPUT
          echo "ASSET_NAME=$(basename $ASSET_PATH)" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          artifacts: ${{ steps.assets.outputs.ASSET_PATH }}

      - name: Remove GitHub source archives
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          TAG="v${{ steps.version.outputs.VERSION }}"
          echo "Removing GitHub-generated source archives from release $TAG in $REPO"
          ASSET_IDS=$(gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[] | select(.name | test("Source code")) | .id' 2>/dev/null || true)
          if [ -z "$ASSET_IDS" ]; then
            echo "No source archives found to remove"
          else
            for id in $ASSET_IDS; do
              echo "Deleting asset id: $id"
              gh api -X DELETE /repos/$REPO/releases/assets/$id -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" || true
            done
          fi


